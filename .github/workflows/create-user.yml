name: Create Temporary User

on:
  workflow_dispatch:
    inputs:
      username:
        description: "Enter username"
        required: true
      expiry_date:
        description: "Expiry date (YYYY-MM-DD)"
        required: true

jobs:
  create-user:
    runs-on: self-hosted  # OR use ubuntu-latest with SSH

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Make script executable
        run: chmod +x scripts/create_user.sh

      - name: Execute script
        run: |
          ./scripts/create_user.sh \
          "${{ github.event.inputs.username }}" \
          "${{ github.event.inputs.expiry_date }}"